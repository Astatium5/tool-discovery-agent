name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  # Kotlin/IntelliJ Plugin Build
  kotlin-build:
    name: Kotlin Build
    runs-on: ubuntu-latest
    continue-on-error: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
      
      - name: Build IntelliJ Plugin
        run: ./gradlew build --no-daemon || true
      
      - name: Verify Plugin JAR
        run: |
          ls -la build/libs/ || true
          echo "Kotlin build completed"
      
      - name: Report status
        run: echo "Kotlin/IntelliJ plugin build finished"

  # Kotlin Lint (ktlint)
  kotlin-lint:
    name: Kotlin Lint
    runs-on: ubuntu-latest
    continue-on-error: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true
      
      - name: Run ktlint check
        run: ./gradlew ktlintCheck --no-daemon || true
      
      - name: Report status
        run: echo "Kotlin lint check finished"
