# GUI-Grounded Agent Configuration
# Default settings for IDE connection and agent parameters

# IDE Connection Settings
ide:
  # Path to IntelliJ IDEA installation
  idea_path: null  # Auto-detect or specify path
  # JetBrains Driver settings
  driver:
    host: "localhost"
    port: 8080
    timeout_seconds: 30
  # IDE launch settings
  launch:
    auto_start: true
    headless: false
    vm_options: []

# Agent Parameters
agent:
  # Discovery Agent settings
  discovery:
    max_exploration_depth: 5
    timeout_per_action_seconds: 10
    cache_discovered_tools: true
    output_file: "discovered_tools.json"
  
  # Planner Agent settings
  planner:
    max_plan_steps: 20
    confidence_threshold: 0.8
    use_llm: false  # Future: enable LLM-based planning
    llm_model: null
  
  # Executor Agent settings
  executor:
    retry_attempts: 3
    retry_delay_seconds: 1
    verify_actions: true
    rollback_on_failure: true

# Perception Settings
perception:
  # UI Tree parsing
  ui_tree:
    include_invisible_elements: false
    max_depth: 20
    element_types:
      - "Button"
      - "Menu"
      - "MenuItem"
      - "Tree"
      - "TreeItem"
      - "Editor"
      - "Dialog"
      - "ToolWindow"
  
  # Screenshot capture (fallback)
  screenshot:
    enabled: true
    output_directory: "screenshots"
    format: "png"
    on_error: true  # Capture on errors for debugging

# Interaction Settings
interaction:
  # Action execution
  actions:
    click_delay_ms: 100
    type_delay_ms: 50
    keystroke_delay_ms: 50
  
  # Safety settings
  safety:
    confirm_destructive_actions: true
    max_actions_per_session: 1000

# Logging Settings
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  format: "rich"  # rich or plain
  file:
    enabled: true
    path: "logs/agent.log"
    rotation: "10 MB"
    retention: "7 days"

# Tool Discovery Settings
tools:
  # Categories to discover
  categories:
    - "refactoring"
    - "navigation"
    - "analysis"
    - "generation"
    - "debugging"
  
  # Tool patterns to match
  patterns:
    menu_patterns:
      - "Refactor*"
      - "Analyze*"
      - "Navigate*"
      - "Code*"
    
    shortcut_patterns:
      - "Ctrl+Alt+*"  # Windows/Linux
      - "Cmd+Alt+*"   # macOS

# Output Settings
output:
  discovered_tools_path: "output/discovered_tools.json"
  execution_logs_path: "output/execution_logs/"
  screenshots_path: "output/screenshots/"