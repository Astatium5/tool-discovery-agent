# Suppress IntelliJ Platform WARN-level logs during runIdeForUiTests
# Use proper java.util.logging Level names (SEVERE = ERROR equivalent)

handlers=java.util.logging.ConsoleHandler

# Root level - SEVERE suppresses WARN, INFO, DEBUG
.level=SEVERE

# Console handler
java.util.logging.ConsoleHandler.level=SEVERE
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter

# Package-specific levels (use SEVERE, not ERROR)
com.intellij.level=SEVERE
org.jetbrains.level=SEVERE